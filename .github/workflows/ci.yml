name: AutoWeld-Vision CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black mypy pytest pytest-cov
        # Install standard requirements
        pip install -r requirements-standard.txt

    - name: Run Black Formatter check
      run: black --check .

    - name: Run Ruff Linter
      run: ruff check .

    - name: Run Static Type Check (mypy)
      run: mypy autoweld_vision --ignore-missing-imports

    - name: Run Unit Tests with Coverage
      env:
        PYTHONPATH: .
      run: |
        # Apply the rich console patch programmatically during testing if needed
        python -c "
        import anomalib.utils.rich
        anomalib.utils.rich.safe_track = lambda sequence, *args, **kwargs: sequence
        "
        pytest tests/ --cov=autoweld_vision --cov-report=xml

    - name: Report Test Coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: false
